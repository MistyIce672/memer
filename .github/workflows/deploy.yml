name: Production Deployment
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR image paths must be lowercase; github.repository is "MistyIce672/memer"
  # (mixed case), so we pin the lowercase form here.
  IMAGE_NAME: mistyice672/memer

jobs:
  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa.key
          chmod 600 ~/.ssh/id_rsa.key
          cat >> ~/.ssh/config << EOF
          Host staging
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa.key
            StrictHostKeyChecking no
          EOF
        env:
          SSH_USER: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOST }}

      - name: Pull and run container
        run: |
          ssh staging 'podman login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}'
          ssh staging 'podman pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'
          ssh staging 'podman stop gesture-meme || true'
          ssh staging 'podman rm gesture-meme || true'
          ssh staging 'podman run -d --restart unless-stopped --name=gesture-meme \
            -p 8000:8000 \
            -e MONGO_URI="${{ secrets.MONGO_URI }}" \
            -e MONGO_DB="${{ secrets.MONGO_DB }}" \
            -v ~/gesture-meme/storage:/app/web/storage \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'
