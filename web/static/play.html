<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gesture Meme — Session</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <header>
      <h1 class="brand">Gesture<span>Meme</span></h1>
      <div class="row">
        <span id="status" class="hint">Loading…</span>
        <button id="start-btn" class="btn-primary" disabled>Start camera</button>
        <a class="btn" href="/">← Library</a>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="stage">
          <div class="pane">
            <video id="cam" playsinline muted></video>
            <div class="label" id="gesture-label">—</div>
          </div>
          <div class="pane meme-pane" id="meme-pane">
            <span class="muted" id="idle-text">Do a gesture…</span>
          </div>
        </div>
        <div class="tray" id="tray"></div>
      </section>
    </main>

    <div id="toast"></div>

    <script type="module" src="/static/js/play.js"></script>
  </body>
</html>
